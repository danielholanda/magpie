# vLLM Benchmark Configuration Example
# =====================================
# This example shows how to benchmark vLLM with DeepSeek-R1 model.
#
# Usage:
#   python -m Magpie benchmark --benchmark-config examples/benchmarks/benchmark_vllm_dsr1.yaml
#
# Prerequisites:
#   - Docker with GPU support
#   - HuggingFace token (HF_TOKEN) for gated models

benchmark:
  framework: vllm
  model: /shared_nfs/Llamas/huggingface/DeepSeek-R1-0528
  precision: fp8
  run_mode: local
  
  # Environment variables
  envs:
    TP: 8
    CONC: 32
    ISL: 128
    OSL: 128
    RANDOM_RANGE_RATIO: 0.8
    MAX_MODEL_LEN: 4090
    
  # Profiler configuration
  profiler:
    torch_profiler:
      enabled: false
    system_profiler:
      enabled: false
      
  gap_analysis:
    enabled: false
    trace_start_pct: 50
    trace_end_pct: 80
    top_k: 20

  # Optional: auto-pick idle GPU(s) before launching. Enabled by default;
  # uncomment to override (see docs/benchmark.md#automatic-gpu-selection).
  # gpu_selection:
  #   auto: true
  #   min_free_memory_gb: 8.0
  #   count: null              # null -> use envs.TP
  #   candidates: [0, 1, 2, 3] # whitelist physical GPU ids (rocm-smi/nvidia-smi)

  # Will auto-clone InferenceX if not specified
  # inferencex_path: ""
  
  # Auto-detect: will use Magpie generic script
  
  # Timeout (DeepSeek-R1 needs time to load)
  timeout_seconds: 3600
