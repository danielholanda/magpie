# vLLM Benchmark Configuration Example
# =====================================
# This example shows how to benchmark vLLM with DeepSeek-R1 model.
#
# Usage:
#   python -m Magpie benchmark --benchmark-config examples/benchmarks/benchmark_vllm_dsr1.yaml
#
# Prerequisites:
#   - Docker with GPU support
#   - HuggingFace token (HF_TOKEN) for gated models

benchmark:
  framework: vllm
  model: deepseek-ai/DeepSeek-R1-0528
  precision: fp8
  
  # Environment variables
  envs:
    TP: 8
    CONC: 32
    ISL: 1024
    OSL: 1024
    RANDOM_RANGE_RATIO: 1
    MAX_MODEL_LEN: 131072
    
  # Profiler configuration
  profiler:
    torch_profiler:
      enabled: true
    system_profiler:
      enabled: false
      
  gap_analysis:
    enabled: false
    trace_start_pct: 50
    trace_end_pct: 80
    top_k: 20

  # Will auto-clone InferenceMAX if not specified
  # inferencemax_path: ""
  
  # Auto-detect: will use Magpie generic script
  
  # Timeout (DeepSeek-R1 needs time to load)
  timeout_seconds: 3600
