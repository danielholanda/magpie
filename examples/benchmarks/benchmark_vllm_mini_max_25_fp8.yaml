# vLLM Benchmark Configuration for amd/Kimi-K2-Thinking-MXFP4
# ============================================================
#
# Usage (Docker - default):
#   python -m Magpie benchmark --benchmark-config examples/benchmarks/benchmark_vllm_mini_max_25_fp8.yaml

# Uses Magpie generic script vllm_mi355x.sh

benchmark:
  framework: vllm
  model: MiniMaxAI/MiniMax-M2.5
  precision: fp8

  envs:
    TP: 2
    CONC: 4
    ISL: 8192
    OSL: 1024
    RANDOM_RANGE_RATIO: 0.8
    MAX_MODEL_LEN: 131072
    EXTRA_VLLM_ARGS: "--no-enable-prefix-caching --block-size 32 --kv-cache-dtype fp8 --attention-backend ROCM_AITER_FA --enable-auto-tool-choice --tool-call-parser minimax_m2 --reasoning-parser minimax_m2_append_think"

    VLLM_ROCM_USE_AITER: 1

  profiler:
    torch_profiler:
      enabled: false
    system_profiler:
      enabled: false
    tracelens:
      enabled: false

  docker_image: "vllm/vllm-openai-rocm:v0.19.1"
  benchmark_script: "vllm_mi355x.sh"
  timeout_seconds: 3600

  gap_analysis:
    enabled: true
    top_k: 100
    find_kernel_sources: true