# Test: Using InferenceX Native Script
# ========================================
# This config tests the benchmark_script lookup priority:
#   Priority 1: User-specified script in InferenceX/benchmarks/
#   Priority 2: InferenceX native scripts: {prefix}_{precision}_{runner}.sh
#   Priority 3: Magpie generic scripts: {framework}_{runner}.sh

# Usage:
#   python -m Magpie benchmark --benchmark-config examples/test_inferencex_script.yaml
#
# Expected: Should use dsr1_fp8_mi300x.sh from InferenceX

benchmark:
  framework: sglang
  model: deepseek-ai/DeepSeek-R1-0528
  precision: fp8
  # run_mode: docker (default) or local
  
  # Environment variables
  envs:
    TP: 8
    CONC: 32
    ISL: 1024
    OSL: 1024
    RANDOM_RANGE_RATIO: 1
    MAX_MODEL_LEN: 131072
    
  # Profiler configuration
  profiler:
    torch_profiler:
      enabled: false
    system_profiler:
      enabled: false
    tracelens:
      enabled: false
      
  # InferenceX path (empty string will auto clone)
  # inferencex_path: ""
  
  # TEST: Specify InferenceX native script directly
  benchmark_script: "dsr1_fp8_mi300x.sh"
  
  # Timeout (DeepSeek-R1 needs time to load)
  timeout_seconds: 3600

