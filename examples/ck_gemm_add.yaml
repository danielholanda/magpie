# Composable Kernel GEMM Add Analyze Example
# ==========================================
# Prereq:
#   git clone https://github.com/ROCm/composable_kernel.git
#   export CK_HOME=/path/to/composable_kernel
# Note:
#   CK builds can be slow; prefer prebuilding the required targets first.
# Usage:
#   python main.py analyze --kernel-config examples/ck_gemm_add.yaml

# Single kernel configuration for analyze mode
kernel:
  id: "ck_gemm_add"
  type: hip
  source_files:
    - "${CK_HOME}/test/gemm_add/test_gemm_add.cpp"
  # The compiled binary acts as both the executable and the test
  # compile_command:
  #   - ["cmake", "-S", "${CK_HOME}", "-B", "${CK_HOME}/build", "-D", "CMAKE_PREFIX_PATH=/opt/rocm", "-D", "CMAKE_CXX_COMPILER=/opt/rocm/bin/hipcc", "-D", "CMAKE_BUILD_TYPE=Release", "-D", "GPU_TARGETS=gfx950"]
  #   - ["cmake", "--build", "${CK_HOME}/build", "--target", "test_gemm_add", "-j8"]
  testcase_command: "bin/test_gemm_add_xdl"
  working_dir: "${CK_HOME}/build"

# Optional: override the profiling backend for this config
# Uncomment to use IntelliKit Metrix instead of the default rocprof-compute
# performance:
#   backend: metrix
#   metrix:
#     num_replays: 3
