# Grouped GEMM XDL Kernel Compare — Accordo Correctness Backend
# ==============================================================
# Compare BF16 vs FP16 grouped GEMM with Accordo HSA-level correctness.
# Prereq:
#   git clone https://github.com/ROCm/composable_kernel.git
#   export CK_HOME=/path/to/composable_kernel
#   Rebuild with debug info: cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo ... && make -j8
#   pip install "git+https://github.com/AMDResearch/intellikit.git@0f2a15c9eba3717e984961e2bcf72a0aa3052713#subdirectory=accordo"
# Note:
#   CK binaries must be compiled with debug info (-g / RelWithDebInfo) so Accordo
#   can extract kernel arguments via kernelDB.
# Usage:
#   python -m Magpie compare --kernel-config examples/ck_grouped_gemm_compare_accordo.yaml

kernels:
  - id: "grouped_gemm_xdl_bf16"
    type: hip
    source_files:
      - "${CK_HOME}/example/15_grouped_gemm/grouped_gemm_xdl_bf16.cpp"
    working_dir: "${CK_HOME}/build"
    testcase_command: "bin/example_grouped_gemm_xdl_bf16"

  - id: "grouped_gemm_xdl_fp16"
    type: hip
    source_files:
      - "${CK_HOME}/example/15_grouped_gemm/grouped_gemm_xdl_fp16.cpp"
    working_dir: "${CK_HOME}/build"
    testcase_command: "bin/example_grouped_gemm_xdl_fp16"

# Override correctness backend to Accordo HSA-level validation.
# timeout_seconds defaults from the task-level timeout.
# working_directory defaults from the kernel's working_dir.
correctness:
  backend: accordo
  accordo:
    kernel_name: "DeviceGroupedGemm_Xdl_CShuffle"
    reference_binary: "bin/example_grouped_gemm_xdl_bf16"
    optimized_binary: "bin/example_grouped_gemm_xdl_fp16"
    atol: 1.0e-3
