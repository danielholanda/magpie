# Magpie Framework Configuration
# ========================================
# This is the framework configuration file.
# Kernel-specific configurations are separate (see kernel_config.yaml.example)

# =============================================================================
# GPU Configuration
# =============================================================================
# This section is the SINGLE source of truth for all GPU-related settings.
# Used by: scheduler, hardware controller, profiler
gpu:
  # List of GPU device IDs to use (null = all available GPUs)
  device_ids: [0]           # e.g., [0, 1, 2, 3] for specific GPUs
  
  # Whether to apply operations in parallel (faster for multi-GPU)
  parallel: true
  
  # Hardware control settings (power/frequency management)
  hardware:
    # Enable hardware control
    enabled: false
    
    # Reset clocks after benchmark
    reset_after_benchmark: true
    
    # Default configuration applied to all GPUs (unless overridden per-GPU)
    default:
      # Power configuration (requires root/sudo)
      power:
        limit_watts: null      # Power limit in watts (null = don't change)
        
      # Frequency configuration
      frequency:
        # For NVIDIA: lock clocks to range (min, max) in MHz
        gpu_clock_mhz: null    # e.g., [1500, 1500] to lock at 1500 MHz
        mem_clock_mhz: null    # e.g., [1215, 1215] to lock memory clock
        # For AMD: clock levels (0-7, where 7 is highest)
        gpu_clock_level: null  # e.g., 7 for maximum performance
        mem_clock_level: null  # e.g., 3 for specific level
    
    # Per-GPU configurations (overrides default for specific GPUs)
    # Example:
    # per_gpu:
    #   0:  # GPU 0 specific settings
    #     power:
    #       limit_watts: 300
    #     frequency:
    #       gpu_clock_mhz: [1800, 1800]
    #   1:  # GPU 1 specific settings
    #     power:
    #       limit_watts: 250
    per_gpu: {}

# =============================================================================
# Output Settings
# =============================================================================
output:
  directory: ./results
  format: json  # json, csv, markdown

# =============================================================================
# Logging
# =============================================================================
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  file: null   # Set path for file logging

# =============================================================================
# Compiling
# =============================================================================
compiling:
  # Enable default compilation when no compile_command is provided
  # If false (default), compilation is skipped for pre-compiled kernels
  # If true, will attempt to compile using hipcc/nvcc based on kernel type
  enable_default_compile: false

# =============================================================================
# Performance Profiling
# =============================================================================
performance:
  # Timeout for profiling operations (seconds)
  timeout_seconds: 300
  
  # rocprof-compute settings (AMD GPU)
  # Two-stage profiler: profile (collect data) + analyze (generate metrics)
  rocprof_compute:
    # Directory to save profiling workloads (relative to kernel working_dir)
    workload_dir: "./workloads"
    
    # Metric blocks to collect (for gfx942/MI300 series)
    # Using reduced set for faster profiling:
    #   1: System Info
    #   2: System Speed-of-Light (FLOPS, utilization, bandwidth)
    #   5: Command Processor (CPC/CPF)
    #  10: Compute Units - Instruction Mix
    #  11: Compute Units - Compute Pipeline
    #  12: Local Data Share (LDS)
    #  14: Scalar L1 Data Cache
    #  16: Vector L1 Data Cache
    #  17: L2 Cache
    metric_blocks: ["1", "2", "5", "10", "11", "12", "14", "16", "17"]
    
    # Skip roofline collection (faster profiling)
    no_roof: true
    
    # Output format for analyze stage
    output_format: "csv"
    
    # Additional profile arguments
    profile_args: []
    
    # Additional analyze arguments  
    analyze_args: []
    
  # ncu settings (NVIDIA GPU)
  # Additional arguments passed to ncu
  ncu:
    args: ["--target-processes", "all"]
    # Specific metrics to collect (empty = default set)
    metrics: []

# =============================================================================
# Scheduler
# =============================================================================
# Note: GPU devices are now configured in the 'gpu' section above.
# The scheduler will use gpu.device_ids automatically.
scheduler:
  max_concurrent_tasks: 1
  environment: local  # local, docker
  
  # Retry settings
  retry:
    enabled: true
    max_retries: 3
